name: Cloud Automations

on:
  schedule:
    # 7:07 AM Asia/Kuala_Lumpur. GitHub cron is UTC, so this is 11:07 PM UTC the previous day.
    - cron: "7 23 * * *"
    # Weekdays 8:07 AM Asia/Kuala_Lumpur. Outreach agents create Gmail drafts only.
    - cron: "7 0 * * 1-5"
    # Weekdays 8:37 AM Asia/Kuala_Lumpur. Backup outreach run because GitHub scheduled jobs can be delayed or dropped.
    - cron: "37 0 * * 1-5"
    # Sunday 10:07 PM Asia/Kuala_Lumpur. Avoid the top of the hour for scheduled reliability.
    - cron: "7 14 * * 0"
    # Sunday 11:07 PM Asia/Kuala_Lumpur. Weekly CRM cold-email research.
    - cron: "7 15 * * 0"
  workflow_dispatch:
    inputs:
      group:
        description: "Automation group to run"
        required: true
        default: "daily-7am"
        type: choice
        options:
          - daily-7am
          - daily-8am
          - daily-9am
          - competition-analysis
          - grant-database
          - marketing-crm
          - weekday-8am-outreach
          - education-outreach
          - corporate-outreach
          - travel-outreach
          - re-engager
          - sunday-10pm
      dry_run:
        description: "Dry run only: true means do not generate/send email"
        required: true
        default: false
        type: boolean
      only_id:
        description: "Optional automation id to run, for example daily-eco-fun-facts"
        required: false
        default: ""
        type: string
      test_to:
        description: "Optional comma-separated test recipient override"
        required: false
        default: ""
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5.4-mini
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CRM_RESEARCH_LIMIT: "200"
      CRM_BATCH_SIZE: "10"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Resolve automation group
        id: group
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "group=${{ inputs.group }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
            echo "only_id=${{ inputs.only_id }}" >> "$GITHUB_OUTPUT"
            echo "test_to=${{ inputs.test_to }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "7 23 * * *" ]; then
            echo "group=daily-7am" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "7 0 * * 1-5" ]; then
            echo "group=weekday-8am-outreach" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "37 0 * * 1-5" ]; then
            echo "group=weekday-8am-outreach" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "7 14 * * 0" ]; then
            echo "group=sunday-10pm" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "7 15 * * 0" ]; then
            echo "group=marketing-crm" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown schedule: ${{ github.event.schedule }}" >&2
            exit 1
          fi

      - name: Run cloud automations
        shell: bash
        run: |
          args=(--group "${{ steps.group.outputs.group }}")
          if [ "${{ steps.group.outputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          if [ -n "${{ steps.group.outputs.only_id }}" ]; then
            args+=(--only-id "${{ steps.group.outputs.only_id }}")
          fi
          if [ -n "${{ steps.group.outputs.test_to }}" ]; then
            args+=(--test-to "${{ steps.group.outputs.test_to }}")
          fi
          node scripts/run-cloud-automations.js "${args[@]}"
