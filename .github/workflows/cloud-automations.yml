name: Cloud Automations

on:
  push:
    branches:
      - main
    paths:
      - "automation-briefs/competitor-analysis.md"
      - "api/lib/marketing-database.js"
      - "api/lib/supabase-admin.js"
      - "supabase_marketing_schema.sql"
      - ".github/workflows/cloud-automations.yml"
  schedule:
    # 8:07 AM Asia/Kuala_Lumpur. Avoid the top of the hour, where GitHub scheduled runs can be delayed or dropped.
    - cron: "7 0 * * *"
    # 9:07 AM Asia/Kuala_Lumpur. Avoid the top of the hour, where GitHub scheduled runs can be delayed or dropped.
    - cron: "7 1 * * *"
    # Sunday 10:07 PM Asia/Kuala_Lumpur. Avoid the top of the hour for scheduled reliability.
    - cron: "7 14 * * 0"
  workflow_dispatch:
    inputs:
      group:
        description: "Automation group to run"
        required: true
        default: "daily-8am"
        type: choice
        options:
          - daily-8am
          - daily-9am
          - competition-analysis
          - grant-database
          - marketing-crm
          - sunday-10pm
      dry_run:
        description: "Dry run only: true means do not generate/send email"
        required: true
        default: false
        type: boolean

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Resolve automation group
        id: group
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "group=${{ inputs.group }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "group=competition-analysis" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "7 0 * * *" ]; then
            echo "group=daily-8am" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "7 1 * * *" ]; then
            echo "group=daily-9am" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "7 14 * * 0" ]; then
            echo "group=sunday-10pm" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown schedule: ${{ github.event.schedule }}" >&2
            exit 1
          fi

      - name: Run cloud automations
        shell: bash
        run: |
          args=(--group "${{ steps.group.outputs.group }}")
          if [ "${{ steps.group.outputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          node scripts/run-cloud-automations.js "${args[@]}"
