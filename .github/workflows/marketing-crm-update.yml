name: Marketing CRM Update

on:
  schedule:
    # Sunday 11:07 PM Asia/Kuala_Lumpur. Weekly CRM cold-email research.
    - cron: "7 15 * * 0"
    # Monday 9:17 AM Asia/Kuala_Lumpur.
    - cron: "17 1 * * 1"
  workflow_dispatch:

jobs:
  update-marketing-crm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5.4-mini
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CRM_RESEARCH_LIMIT: "2500"
      CRM_BATCH_SIZE: "30"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Update marketing CRM leads
        run: node scripts/run-cloud-automations.js --group marketing-crm
