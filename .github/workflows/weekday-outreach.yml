name: Weekday Outreach

on:
  schedule:
    # Weekdays 8:07 AM Asia/Kuala_Lumpur.
    - cron: "7 0 * * 1-5"
    # Weekdays 8:37 AM Asia/Kuala_Lumpur fallback.
    - cron: "37 0 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        automation:
          - education-outreach-finder
          - corporate-outreach-finder
          - travel-outreach-finder
          - re-engager
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5.4-mini
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    name: ${{ matrix.automation }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run outreach automation
        run: node scripts/run-cloud-automations.js --group weekday-8am-outreach --only-id "${{ matrix.automation }}"
