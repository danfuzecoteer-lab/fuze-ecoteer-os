name: Grant Database Update

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "automation-briefs/grant-deep-research.md"
      - "api/lib/grant-database.js"
      - ".github/workflows/grant-database-update.yml"
  schedule:
    # Thursday 9:07 AM Asia/Kuala_Lumpur. Avoid the top of the hour, where GitHub scheduled runs can be delayed or dropped.
    - cron: "7 1 * * 4"
    # Thursday 9:37 AM Asia/Kuala_Lumpur fallback, so a missed first scheduled event does not skip the weekly update.
    - cron: "37 1 * * 4"

jobs:
  update-grants:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      GRANT_RESEARCH_LIMIT: "70"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Update grant database
        run: node scripts/run-cloud-automations.js --group grant-database
